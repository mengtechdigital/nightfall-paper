# Nightfall — long days, short lethal nights.

# Worlds the plugin acts on. Time control, sleep prevention, and night
# threats only apply in worlds listed here. Add nether/end at your own
# risk; they don't have a real day/night cycle.
worlds:
  - world

# Real-time minutes for each phase. Vanilla defaults to 10/10.
day-length-minutes: 30.0
night-length-minutes: 6.0

# Cancel TimeSkipEvent (NIGHT_SKIP). Players may still enter beds — that
# sets their respawn point — but the night will not skip.
prevent-night-skip: true

# Optional message sent to all players in a managed world when a sleep
# skip is blocked. Empty disables.
sleep-skip-blocked-message: "&8&oThe night refuses to end."

night:
  # ----- Runner zombies ----------------------------------------------------
  # Fraction of zombies (zombies, husks, drowned, zombie villagers) that
  # become "runners" — Speed II, infinite duration, custom name.
  runner-chance: 0.35
  runner-speed-amplifier: 1
  runner-name: "&cRunner"

  # ----- Jumper zombies ----------------------------------------------------
  # Fraction of zombies that become "jumpers" — Jump Boost + periodic
  # leaps toward nearby players. Stacks with runners (a zombie can be both).
  jumper-chance: 0.25
  jumper-jump-amplifier: 2
  jumper-name: "&2Jumper"

  # ----- Door-breaking -----------------------------------------------------
  # Force zombies to break doors regardless of difficulty. Applies to
  # plain zombies and zombie villagers. (Husks/drowned can't path
  # door-break in vanilla.)
  force-zombie-door-break: true

  # ----- Mob buffs ---------------------------------------------------------
  # Hostile mobs spawned at night get scaled max-health and attack-damage.
  # Applies to all org.bukkit.entity.Monster: zombie, skeleton, creeper,
  # spider, witch, drowned, husk, stray, pillager, vindicator, evoker,
  # ravager, phantom, wither skeleton, etc.
  mob-buff:
    enabled: true
    max-health-multiplier: 2.0     # +100% HP
    attack-damage-multiplier: 1.6  # +60% damage

  # ----- Charged creepers --------------------------------------------------
  # During thunderstorms, creepers have a chance to spawn already charged.
  charged-creeper:
    enabled: true
    chance: 0.60                   # 60% during thunderstorms

  # ----- Storm buff --------------------------------------------------------
  # During rain or thunderstorms, all hostile mobs get an extra stat boost
  # on top of the normal mob-buff multipliers.
  storm-buff:
    enabled: true
    max-health-multiplier: 1.25    # +25% HP on top of base buff
    attack-damage-multiplier: 1.15 # +15% damage on top of base buff

  # ----- Distance scaling --------------------------------------------------
  # The further from spawn a mob spawns, the stronger it becomes.
  # Scaling starts at start-distance (0% bonus) and grows linearly.
  # At max-distance the multiplier equals the configured value; beyond
  # that it keeps stacking forever — so 10,000 blocks out is 2× the
  # multiplier, 15,000 blocks is 3×, etc.
  distance-scaling:
    enabled: true
    use-world-spawn: true
    start-distance: 500            # blocks from spawn where scaling begins
    max-distance: 5000             # blocks for 1.0 factor; beyond = infinite growth
    max-health-multiplier: 2.0     # +100% HP at factor 1.0; doubles every 5k beyond
    attack-damage-multiplier: 1.5  # +50% damage at factor 1.0; stacks infinitely

  # ----- Mob gear ----------------------------------------------------------
  # Night mobs can spawn wearing enchanted armor and weapons. Gear tier
  # and enchantment levels scale with distance from spawn and can exceed
  # vanilla limits (Protection X, Sharpness XV, etc.).
  mob-gear:
    enabled: true
    base-chance: 0.15              # 15% at spawn
    chance-per-1000-blocks: 0.08   # +8% per 1k blocks from spawn
    allow-overlevel-enchants: true # allow above vanilla max levels
    drop-chance: 0.08              # chance each gear piece drops on death

  # ----- Vanilla spawn blocker ---------------------------------------------
  # Cancels all vanilla NATURAL hostile mob spawns at night in managed
  # worlds. This kills AFK mob farms because mobs no longer spawn in
  # dark rooms — they only spawn near players via our extra-spawn system.
  disable-vanilla-night-spawns: true

  # ----- Loot --------------------------------------------------------------
  # Buffed night mobs drop bonus XP and have a chance to roll extra items.
  # Only mobs that were modified by Nightfall (natural night spawns and
  # extra spawns) give bonus loot — spawner-farm mobs are excluded.
  loot:
    xp-multiplier: 2.0
    extra-loot:
      enabled: true
      base-chance: 0.20            # 20% chance for an extra drop
      storm-bonus: 0.15            # +15% during rain/thunder (35% total)
      drops:
        IRON_NUGGET:
          weight: 30
          min: 1
          max: 3
        ARROW:
          weight: 25
          min: 2
          max: 4
        BONE:
          weight: 20
          min: 1
          max: 2
        GOLD_NUGGET:
          weight: 15
          min: 1
          max: 2
        LAPIS_LAZULI:
          weight: 12
          min: 1
          max: 3
        GLOWSTONE_DUST:
          weight: 10
          min: 1
          max: 2
        EMERALD:
          weight: 6
          min: 1
          max: 1
        DIAMOND:
          weight: 2
          min: 1
          max: 1

  # ----- Logout dummies (CombatLogX-style) ---------------------------------
  # If a player disconnects during night in a managed world, a dummy
  # zombie wearing their gear spawns at their last position. If the
  # dummy is killed before the player logs back on, the player suffers
  # a death-on-rejoin (drop inventory at the dummy's death spot, lose
  # XP). The dummy is fire-resistant so daytime sun won't auto-kill it.
  logout-dummy:
    enabled: true
    # {player} is replaced with the username.
    name: "&7&o{player} (sleeping)"
    drop-inventory-on-kill: true
    clear-xp-on-kill: true

  # ----- Extra spawns ------------------------------------------------------
  # Periodically spawn additional hostile mobs near players during night.
  # This now acts as the PRIMARY spawn system when vanilla night spawns
  # are disabled. Mobs are picked from the weighted list below — cross-
  # world mobs (Blaze, Ghast, Wither Skeleton, etc.) can invade.
  #
  # Flying mobs (Blaze, Ghast, Phantom, Vex) spawn in the air above the
  # target location instead of on the ground.
  extra-spawn:
    enabled: true
    interval-seconds: 8            # how often the task runs
    per-player-per-cycle: 4        # mobs spawned per player each tick
    max-per-world: 120             # hard cap per managed world
    min-distance: 20               # min horizontal distance from player
    max-distance: 40               # max horizontal distance from player
    require-darkness: true         # only in light level <= 7 (ignored for flyers)
    # Weighted picks. Higher weight = more common. Names are EntityType
    # constants. Unknown names are skipped at load time with a warning.
    mob-weights:
      ZOMBIE: 6
      SKELETON: 4
      SPIDER: 3
      CREEPER: 2
      WITCH: 2
      BLAZE: 1
      GHAST: 1
      WITHER_SKELETON: 1
      PIGLIN: 1
      ENDERMAN: 1
      MAGMA_CUBE: 1

messages:
  prefix: "&8[&5Nightfall&8] &r"
  no-permission: "&cYou don't have permission to do that."
  reloaded: "&aNightfall config reloaded."
  status: |-
    &7World: &f{world}
    &7Phase: &f{phase}  &8(time {time}/24000)
    &7Day length: &f{day} min   &7Night length: &f{night} min
    &7Sleep skip: &f{sleep-skip}   &7Mob buff: &f{mob-buff}
    &7Extra spawns this world: &f{extras}
  forced-day: "&eForced day in &f{world}&e."
  forced-night: "&eForced night in &f{world}&e."
  unknown-world: "&cThat world isn't loaded."
